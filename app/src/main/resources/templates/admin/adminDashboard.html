<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" type="image/png" th:href="@{/assets/images/logo/logo.png}" />

    <!-- Page Title -->
    <title>Admin Dashboard</title>

    <!-- CSS Stylesheets -->
    <link rel="stylesheet" th:href="@{/css/adminDashboard.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- Shared JavaScript Files -->
    <script th:src="@{/js/render.js}" defer></script>
    <script th:src="@{/js/util.js}" defer></script>
    <script th:src="@{/js/header.js}" defer></script>
    <script th:src="@{/js/footer.js}" defer></script>
</head>

<body onload="renderContent()">

<!-- Main Container -->
<div class="container">

    <!-- Wrapper -->
    <div class="wrapper">

        <!-- Header Placeholder -->
        <div id="header"></div>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Dashboard Heading -->
            <section class="dashboard-header">
                <h1>Admin Dashboard</h1>
                <p>Manage doctors, schedules, and appointments.</p>
            </section>

            <!-- Search and Filter Controls -->
            <section class="controls">

                <!-- Search Bar -->
                <input
                        type="text"
                        id="searchBar"
                        placeholder="Search doctors..."
                >

                <!-- Time Filter -->
                <select id="timeFilter">
                    <option value="">Filter by Time</option>
                    <option value="AM">AM</option>
                    <option value="PM">PM</option>
                </select>

                <!-- Specialty Filter -->
                <select id="specialtyFilter">
                    <option value="">Filter by Specialty</option>
                    <option value="Cardiologist">Cardiologist</option>
                    <option value="Dentist">Dentist</option>
                    <option value="Dermatologist">Dermatologist</option>
                    <option value="Neurologist">Neurologist</option>
                    <option value="Orthopedic">Orthopedic</option>
                    <option value="Pediatrician">Pediatrician</option>
                </select>

            </section>

            <!-- Dynamic Content Area -->
            <section id="content">
                <!-- Doctor cards or dashboard content will render here -->
            </section>

        </main>

        <!-- Footer Placeholder -->
        <div id="footer"></div>

    </div>
</div>

<!-- Modal Structure -->
<div id="modal" class="modal">

    <!-- Modal Content -->
    <div class="modal-content">

        <!-- Close Button -->
        <span class="close-btn">&times;</span>

        <!-- Modal Body -->
        <div id="modal-body">
            <!-- Dynamic modal content goes here -->
        </div>

    </div>
</div>

<!-- Page-Specific JavaScript Modules -->
<script type="module" th:src="@{/js/adminDashboard.js}" defer></script>
<script type="module" th:src="@{/js/doctorCard.js}" defer></script>

</body>

</html>
